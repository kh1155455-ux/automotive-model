<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy X UI</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  color:white;
  overflow:hidden;
  background:black;
}

/* 🌠 Animated Moving Stars */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* Pages */
.page {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active {
  display:flex;
  animation: fade 0.6s ease;
}

@keyframes fade {
  from {opacity:0; transform:scale(0.95);}
  to {opacity:1; transform:scale(1);}
}

/* Glass UI */
.box {
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(15px);
  text-align:center;
}

/* Inputs */
input {
  display:block;
  margin:10px auto;
  padding:10px;
  width:220px;
  border:none;
  border-radius:8px;
}

/* 🔘 Neon Buttons */
button {
  margin:10px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

button:hover {
  box-shadow:0 0 15px #00c6ff,0 0 30px #0072ff;
  transform:scale(1.08);
}

button:active {
  transform:scale(0.95);
}

/* Dashboard grid */
.menu {
  display:grid;
  grid-template-columns: repeat(2,150px);
  gap:20px;
}

/* Image */
img {
  width:300px;
  border-radius:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- 🔐 LOGIN -->
<div id="login" class="page active">
  <div class="box">
    <h2>🚀 Galaxy X</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- 🧭 DASHBOARD -->
<div id="dashboard" class="page">
  <h1>🌌 Control Panel</h1>
  <div class="menu">
    <button onclick="go('explore')">Explore</button>
    <button onclick="go('ai')">AI</button>
    <button onclick="go('profile')">Profile</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- 🌌 EXPLORE -->
<div id="explore" class="page">
  <h2>🛰️ Space Feed</h2>
  <img id="img">
  <p id="title"></p>
  <button onclick="go('dashboard')">Back</button>
</div>

<!-- 🤖 AI PANEL -->
<div id="ai" class="page">
  <div class="box">
    <h2>🤖 Galaxy AI</h2>
    <p id="aiText">Hello Commander 👨‍🚀</p>
    <button onclick="talk()">Ask Something</button>
    <button onclick="go('dashboard')">Back</button>
  </div>
</div>

<!-- 👤 PROFILE -->
<div id="profile" class="page">
  <div class="box">
    <h2>👤 Profile</h2>
    <p>Welcome to Galaxy System</p>
    <button onclick="go('dashboard')">Back</button>
  </div>
</div>

<script>
// 🔐 LOGIN
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    switchPage("dashboard");
    loadNASA();
  } else alert("Wrong login");
}

// 🚪 LOGOUT
function logout(){
  switchPage("login");
}

// 🔁 SWITCH PAGE
function go(page){
  switchPage(page);
}

function switchPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// 🛰️ NASA API
function loadNASA(){
  fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
  .then(res=>res.json())
  .then(d=>{
    img.src=d.url;
    title.innerText=d.title;
  });
}

// 🤖 Fake AI
function talk(){
  let responses=[
    "Exploring galaxy data...",
    "Stars are forming 🌠",
    "New planet discovered 🪐",
    "Signal received from space 📡"
  ];
  aiText.innerText = responses[Math.floor(Math.random()*responses.length)];
}

// 🌠 STARFIELD
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    z: Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.fillStyle="white";
    ctx.fillRect(s.x,s.y,s.z,s.z);
    s.y += s.z;
    if(s.y > canvas.height) s.y = 0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
